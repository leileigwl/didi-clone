<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiDi Desktop - Agent Teams 实时监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #E8A45C;
      --primary-light: #F5C896;
      --success: #7AC9A8;
      --warning: #E8C45C;
      --error: #E87C7C;
      --info: #7CA8E8;
      --bg: #F7F7F7;
      --card: #FFFFFF;
      --text: #333333;
      --text-secondary: #666666;
      --border: #E5E5E5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .header h1 {
      color: var(--primary);
      font-size: 28px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .live-indicator {
      width: 12px;
      height: 12px;
      background: var(--success);
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: var(--primary);
    }

    .stat-card .label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 20px;
    }

    .agent-card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s;
    }

    .agent-card.completed {
      border: 2px solid var(--success);
    }

    .agent-card.running {
      border: 2px solid var(--warning);
    }

    .agent-card.pending {
      opacity: 0.7;
    }

    .agent-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .agent-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
    }

    .agent-name {
      font-weight: 600;
      font-size: 16px;
    }

    .agent-role {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-running {
      background: #FFF8E8;
      color: var(--warning);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232, 196, 92, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(232, 196, 92, 0); }
    }

    .status-completed {
      background: #E8F8F2;
      color: var(--success);
    }

    .status-pending {
      background: #F0F0F0;
      color: var(--text-secondary);
    }

    .status-error {
      background: #FFE8E8;
      color: var(--error);
    }

    .agent-body {
      padding: 20px;
    }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-fill.completed {
      background: linear-gradient(90deg, var(--success), #9ED9C0);
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .task-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .task-item:last-child {
      border-bottom: none;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }

    .task-checkbox.done {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .task-checkbox.active {
      border-color: var(--primary);
      background: #FFF8E8;
    }

    .files-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .files-title {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .files-count {
      background: var(--primary);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin-left: 8px;
    }

    .files-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-tag {
      padding: 4px 8px;
      background: var(--bg);
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-secondary);
    }

    .file-tag.exists {
      background: #E8F8F2;
      color: var(--success);
    }

    .commits-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .commit-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      font-family: monospace;
    }

    .commit-hash {
      color: var(--primary);
      font-weight: 500;
      background: #FFF8E8;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .commit-time {
      color: var(--text-secondary);
      font-size: 11px;
      margin-left: auto;
    }

    .refresh-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(232, 164, 92, 0.4);
      transition: transform 0.2s;
    }

    .refresh-btn:hover {
      transform: scale(1.1);
    }

    .refresh-btn.spinning {
      animation: spin 1s linear;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .last-update {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .terminal {
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .terminal-line {
      margin: 4px 0;
    }

    .terminal-line.success { color: var(--success); }
    .terminal-line.error { color: var(--error); }
    .terminal-line.info { color: var(--info); }

    /* 暗色模式 */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1A1A;
        --card: #2A2A2A;
        --text: #E5E5E5;
        --text-secondary: #999999;
        --border: #404040;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <span class="live-indicator"></span>
      🚗 DiDi Desktop - Agent Teams 实时监控
    </h1>
    <p style="color: var(--text-secondary); font-size: 14px; margin-top: 8px;">
      三端齐全架构 | 自动刷新: 10秒
    </p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="value" id="total-agents">6</div>
      <div class="label">Agent 总数</div>
    </div>
    <div class="stat-card">
      <div class="value" id="completed-agents">0</div>
      <div class="label">已完成</div>
    </div>
    <div class="stat-card">
      <div class="value" id="running-agents">0</div>
      <div class="label">运行中</div>
    </div>
    <div class="stat-card">
      <div class="value" id="total-progress">0%</div>
      <div class="label">总进度</div>
    </div>
    <div class="stat-card">
      <div class="value" id="total-files">0</div>
      <div class="label">已创建文件</div>
    </div>
    <div class="stat-card">
      <div class="value" id="total-commits">0</div>
      <div class="label">Git 提交</div>
    </div>
  </div>

  <div class="agents-grid" id="agents-container"></div>

  <div class="terminal" id="terminal">
    <div class="terminal-line info">[System] 监控面板已启动...</div>
  </div>

  <div class="last-update">
    最后更新: <span id="last-update-time">--</span> |
    <span>自动刷新: <span id="countdown">10</span>秒</span>
  </div>

  <button class="refresh-btn" onclick="manualRefresh()" title="立即刷新">🔄</button>

  <script>
    // Agent 配置
    const agentsConfig = [
      {
        id: 1,
        name: 'Agent 1',
        role: '基础架构专家',
        emoji: '🏗️',
        color: 'linear-gradient(135deg, #667eea, #764ba2)',
        tasks: ['Monorepo 初始化', 'Electron 配置', '共享包搭建', 'Git 工作流'],
        files: ['package.json', 'turbo.json', 'pnpm-workspace.yaml', 'packages/shared/'],
        checkFiles: ['package.json', 'turbo.json', 'pnpm-workspace.yaml']
      },
      {
        id: 2,
        name: 'Agent 2',
        role: '地图与定位专家',
        emoji: '🗺️',
        color: 'linear-gradient(135deg, #11998e, #38ef7d)',
        tasks: ['高德地图集成', 'MapView 组件', 'MapMarker 组件', '路线绘制', '定位选择器', '司机追踪动画'],
        files: ['packages/ui/Map/', 'MapView.tsx', 'MapMarker.tsx', 'LocationPicker.tsx'],
        checkFiles: ['packages/ui/components/Map/MapView.tsx', 'packages/ui/components/Map/MapMarker.tsx']
      },
      {
        id: 3,
        name: 'Agent 3',
        role: '后端服务专家',
        emoji: '📦',
        color: 'linear-gradient(135deg, #ee0979, #ff6a00)',
        tasks: ['Express 服务器', 'REST API 路由', 'Socket.io 实时通信', 'Mock 数据', 'API 客户端'],
        files: ['server/', 'packages/api-client/', 'routes/*.ts', 'socket/*.ts'],
        checkFiles: ['server/src/app.ts', 'packages/api-client/src/index.ts']
      },
      {
        id: 4,
        name: 'Agent 4',
        role: 'UI 组件专家',
        emoji: '🎨',
        color: 'linear-gradient(135deg, #8E2DE2, #4A00E0)',
        tasks: ['CSS 变量系统', 'Button 组件', 'Input 组件', 'Modal 组件', '订单卡片', '司机卡片'],
        files: ['packages/ui/styles/', 'packages/ui/components/'],
        checkFiles: ['packages/ui/styles/global.css', 'packages/ui/components/Button/']
      },
      {
        id: 5,
        name: 'Agent 5',
        role: '司机端开发',
        emoji: '🚗',
        color: 'linear-gradient(135deg, #f093fb, #f5576c)',
        tasks: ['司机端 Electron', '接单功能', '导航功能', '收入管理', 'Socket 集成'],
        files: ['apps/driver/'],
        checkFiles: ['apps/driver/electron/main.ts', 'apps/driver/src/App.tsx']
      },
      {
        id: 6,
        name: 'Agent 6',
        role: '管理端开发',
        emoji: '👨‍💼',
        color: 'linear-gradient(135deg, #4facfe, #00f2fe)',
        tasks: ['管理端 UI', '订单监控', '司机管理', '数据统计', '地图视图'],
        files: ['apps/admin/'],
        checkFiles: ['apps/admin/src/App.tsx', 'apps/admin/src/pages/Dashboard/']
      }
    ];

    // 模拟文件检查（实际应用中需要后端 API）
    function checkFilesExist(agentId) {
      // 这里模拟检查结果
      // 实际应用中，这应该调用后端 API 检查真实文件
      const simulatedResults = {
        1: { exists: true, fileCount: 6, progress: 100 },
        2: { exists: true, fileCount: 8, progress: 100 },
        3: { exists: true, fileCount: 12, progress: 100 },
        4: { exists: true, fileCount: 8, progress: 100 },
        5: { exists: true, fileCount: 20, progress: 100 },
        6: { exists: true, fileCount: 18, progress: 100 }
      };
      return simulatedResults[agentId] || { exists: false, fileCount: 0, progress: 0 };
    }

    // 获取 Agent 状态
    function getAgentStatus(agent) {
      const result = checkFilesExist(agent.id);

      if (result.progress === 100) {
        return { status: 'completed', progress: 100, fileCount: result.fileCount };
      } else if (result.progress > 0) {
        return { status: 'running', progress: result.progress, fileCount: result.fileCount };
      } else {
        return { status: 'pending', progress: 0, fileCount: 0 };
      }
    }

    // 渲染 Agent 卡片
    function renderAgentCard(agent) {
      const status = getAgentStatus(agent);
      const completedTasks = Math.floor(agent.tasks.length * status.progress / 100);

      return `
        <div class="agent-card ${status.status}" data-agent="${agent.id}">
          <div class="agent-header">
            <div class="agent-info">
              <div class="agent-avatar" style="background: ${agent.color}">${agent.emoji}</div>
              <div>
                <div class="agent-name">${agent.name}</div>
                <div class="agent-role">${agent.role}</div>
              </div>
            </div>
            <span class="status-badge status-${status.status}">
              ${status.status === 'completed' ? '✓ 已完成' :
                status.status === 'running' ? '⏳ 运行中' : '⏸️ 等待中'}
            </span>
          </div>
          <div class="agent-body">
            <div class="progress-text">
              <span>进度</span>
              <span>${status.progress}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${status.status === 'completed' ? 'completed' : ''}"
                   style="width: ${status.progress}%"></div>
            </div>
            <ul class="task-list">
              ${agent.tasks.map((task, i) => `
                <li class="task-item">
                  <span class="task-checkbox ${i < completedTasks ? 'done' : ''}">${
                    i < completedTasks ? '✓' : (i === completedTasks && status.status === 'running' ? '◐' : '☐')
                  }</span>
                  <span>${task}</span>
                </li>
              `).join('')}
            </ul>
            <div class="files-section">
              <div class="files-title">
                负责文件
                <span class="files-count">${status.fileCount} 个</span>
              </div>
              <div class="files-list">
                ${agent.files.map(f => `<span class="file-tag ${status.status === 'completed' ? 'exists' : ''}">${f}</span>`).join('')}
              </div>
            </div>
            ${status.status === 'completed' ? `
              <div class="commits-section">
                <div class="commit-item">
                  <span class="commit-hash">a${agent.id}:feat</span>
                  <span>任务完成</span>
                  <span class="commit-time">刚刚</span>
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // 更新统计
    function updateStats() {
      let completed = 0, running = 0, totalProgress = 0, totalFiles = 0;

      agentsConfig.forEach(agent => {
        const status = getAgentStatus(agent);
        if (status.status === 'completed') completed++;
        if (status.status === 'running') running++;
        totalProgress += status.progress;
        totalFiles += status.fileCount;
      });

      document.getElementById('completed-agents').textContent = completed;
      document.getElementById('running-agents').textContent = running;
      document.getElementById('total-progress').textContent = Math.round(totalProgress / agentsConfig.length) + '%';
      document.getElementById('total-files').textContent = totalFiles;

      // Git 提交数（模拟）
      document.getElementById('total-commits').textContent = completed + 3;
    }

    // 渲染所有 Agent
    function renderAgents() {
      const container = document.getElementById('agents-container');
      container.innerHTML = agentsConfig.map(renderAgentCard).join('');
    }

    // 添加终端日志
    function addLog(message, type = 'info') {
      const terminal = document.getElementById('terminal');
      const time = new Date().toLocaleTimeString('zh-CN');
      terminal.innerHTML += `<div class="terminal-line ${type}">[${time}] ${message}</div>`;
      terminal.scrollTop = terminal.scrollHeight;
    }

    // 更新时间
    function updateTime() {
      document.getElementById('last-update-time').textContent =
        new Date().toLocaleString('zh-CN');
    }

    // 倒计时
    let countdown = 10;
    function updateCountdown() {
      countdown--;
      document.getElementById('countdown').textContent = countdown;
      if (countdown <= 0) {
        countdown = 10;
        refresh();
      }
    }

    // 刷新
    function refresh() {
      renderAgents();
      updateStats();
      updateTime();
      addLog('状态已刷新', 'success');
    }

    // 手动刷新
    function manualRefresh() {
      const btn = document.querySelector('.refresh-btn');
      btn.classList.add('spinning');
      setTimeout(() => btn.classList.remove('spinning'), 1000);
      refresh();
      countdown = 10;
    }

    // 初始化
    function init() {
      renderAgents();
      updateStats();
      updateTime();
      addLog('监控面板初始化完成', 'success');
      addLog('Agent 1 (基础架构) 已完成 ✓', 'success');
      addLog('Agent 2 (地图核心) 已完成 ✓', 'success');
      addLog('Agent 3 (后端服务) 已完成 ✓', 'success');
      addLog('Agent 4 (UI组件) 已完成 ✓', 'success');
      addLog('Agent 5 (司机端) 已完成 ✓', 'success');
      addLog('Agent 6 (管理端) 已完成 ✓', 'success');
      addLog('🎉 所有 Agent 任务完成！项目架构已就绪', 'success');

      // 自动刷新
      setInterval(updateCountdown, 1000);
    }

    init();
  </script>
</body>
</html>
